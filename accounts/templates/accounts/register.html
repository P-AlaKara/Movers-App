<section class="section">
  <div class="container">
    <h2 class="title has-text-centered">Sign Up</h2>
    <form method="post" class="box">
      {% csrf_token %}
      {{ form.non_field_errors }}
      {% for field in form %}
        <div class="field">
          {{ field.label_tag }}
          <div class="control">
            {{ field }}
          </div>
          {{ field.errors }}
        </div>
      {% endfor %}
      <div class="field">
        <div class="control">
          <button class="button is-primary is-fullwidth" type="submit">Sign Up</button>
        </div>
      </div>
    </form>
    <p class="has-text-centered mt-4">
      Already have an account? <a href="{% url 'login' %}">Log in</a>
    </p>
  </div>
</section>
