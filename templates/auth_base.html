{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Songa{% endblock %}</title>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pb1Y7G0r5c1pNzM4D1qjXVYdE4/dsyP4QnL2L9G+ZZVv1YhKphgm9JRI+zC+5fP6cV92JfCkI3bZ+W6S3JXK0A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #2d63c3 0%, #1e47a0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2d63c3;
            margin-bottom: 0.5rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            font-size: 0.95rem;
            color: #7a8a99;
        }

        .auth-divider {
            text-align: center;
            margin: 2rem 0;
            color: #7a8a99;
            font-size: 0.9rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #7a8a99;
        }

        .auth-footer a {
            color: #2d63c3;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
    <script defer src="{% static 'js/main.js' %}"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🚚</div>
            <h1 class="auth-title">{% block auth_title %}Songa{% endblock %}</h1>
            <p class="auth-subtitle">{% block auth_subtitle %}Moving made simple{% endblock %}</p>
        </div>

        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
