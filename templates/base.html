{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Songa</title>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pb1Y7G0r5c1pNzM4D1qjXVYdE4/dsyP4QnL2L9G+ZZVv1YhKphgm9JRI+zC+5fP6cV92JfCkI3bZ+W6S3JXK0A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <script defer src="{% static 'js/main.js' %}"></script>
</head>
<body>

<nav class="navbar is-primary" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item" href="/">
      <strong>Songa</strong>
    </a>
    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasic">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>

  <div id="navbarBasic" class="navbar-menu">
    <div class="navbar-start">
      <a class="navbar-item" href="/">Home</a>
    </div>

    <div class="navbar-end">
      <div class="navbar-item">
        <div class="buttons">
          {% if user.is_authenticated %}
            <a class="button is-light" href="{% url 'dashboard' %}">
              <span class="icon"><i class="fas fa-tachometer-alt"></i></span>
              <span>Dashboard</span>
            </a>
            <a class="button is-light" href="{% url 'my-profile' %}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span>Profile</span>
            </a>
            <a class="button is-danger" href="{% url 'logout' %}">Logout</a>
          {% else %}
            <a class="button is-light" href="{% url 'login' %}">Log in</a>
            <a class="button is-primary" href="{% url 'register' %}"><strong>Sign up</strong></a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer class="footer">
  <div class="content has-text-centered">
    <p>© 2026 <strong>Songa</strong>. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
