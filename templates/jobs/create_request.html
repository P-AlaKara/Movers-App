<section class="section">
  <div class="container">
    <h2 class="title">Create Moving Request</h2>

    <div class="columns is-centered">
      <div class="column is-half">
        <form method="post" class="box">
      {% csrf_token %}
      {{ form.non_field_errors }}

      {% for field in form %}
        <div class="field">
          {{ field.label_tag }}
          <div class="control">
            {{ field }}
          </div>
          {{ field.errors }}
        </div>
      {% endfor %}

      <div class="field is-grouped">
        <div class="control">
          <button class="button is-primary" type="submit">Submit</button>
        </div>
        <div class="control">
          <a class="button is-light" href="{% url 'dashboard' %}">Cancel</a>
        </div>
      </div>
        </form>
      </div>
    </div>
  </div>
</section>
