<h2>Available Jobs</h2>

{% if jobs %}
    <div class="job-list">
        {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.pickup_location }} → {{ job.dropoff_location }}</h3>
                <p><strong>Date:</strong> {{ job.moving_date }}</p>
                <p><strong>Status:</strong> {{ job.status }}</p>

                <a href="{% url 'place_bid' job.id %}">
                    <button>Place Bid</button>
                </a>
            </div>
            <hr>
        {% endfor %}
    </div>
{% else %}
    <p>No jobs available in your service area right now.</p>
{% endif %}
