{% extends "base.html" %}
{% block title %}Customer Dashboard{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div style="text-align: center; margin-bottom: 3rem;">
      <h2 class="title is-2" style="color: #2d63c3;">
        <span class="icon"><i class="fas fa-home"></i></span>
        <span>Customer Dashboard</span>
      </h2>
      <p class="subtitle" style="color: #7a8a99;">You can create and manage your moving requests</p>
    </div>

    <div class="box" style="text-align: center; padding: 2rem;">
      <a class="button is-primary" href="{% url 'create_request' %}" style="padding: 0.85rem 2rem; font-size: 1rem;">
        <span class="icon"><i class="fas fa-plus"></i></span>
        <span>Create New Request</span>
      </a>
    </div>
  </div>
</section>
{% endblock %}
